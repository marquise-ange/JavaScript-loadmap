    <script>
      let paragraph = document.getElementById("card-text-id");
      paragraph.style.color = "red";

      const heading = document.querySelector("#title");
      const heading2 = document.querySelectorAll("#title");
      console.log(heading2);
      console.log(heading);

      heading2[1].style.color = "blue";
      heading2[1].innerHTML = "Date" + " " + Date();

      document.getElementById("image").src =
        "https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=1050&q=80";

      function validateForm() {
        let x = document.forms["myForm"]["fname"].value;
        if (x == "") {
          alert("Name must be filled out");
          return false;
        }
      }

      function myFunction() {
        // Get the value of the input field with id="numb"
        let z = document.getElementById("numb").value;
        // If z is Not a Number or less than one or greater than 10
        let text;
        if (isNaN(z) || z < 1 || z > 10) {
          text = "Input not valid";
        } else {
          text = "Input OK";
        }
        document.getElementById("demo").innerHTML = text;
      }

      function myMove() {
        let id = null;
        const elem = document.getElementById("animate");
        let pos = 0;
        clearInterval(id);
        id = setInterval(frame, 5);
        function frame() {
          if (pos == 350) {
            clearInterval(id);
          } else {
            pos++;
            elem.style.top = pos + "px";
            elem.style.left = pos + "px";
          }
        }
      }
    </script>
